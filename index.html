<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting-to-Decision Extractor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-start justify-center px-4 py-10">
  <main class="w-full max-w-2xl space-y-6">
    <header class="space-y-2">
      <h1 class="text-2xl font-bold tracking-tight">Meeting-to-Decision Extractor</h1>
      <p class="text-sm text-slate-400">Paste a transcript. Get clean decisions, owners, and deadlines. Auto-post to Slack.</p>
    </header>

    <section class="rounded-xl border border-slate-800 bg-slate-900/60 p-4 space-y-4">
      <div class="space-y-1">
        <label class="text-xs font-medium text-slate-300">Meeting transcript</label>
        <textarea id="transcript" rows="8" placeholder="Paste your transcript or meeting notes here..."
          class="w-full rounded-lg border border-slate-800 bg-slate-950/60 p-3 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
      </div>

      <div class="space-y-1">
        <label class="text-xs font-medium text-slate-300">Slack incoming webhook URL</label>
        <input id="webhook" type="url" placeholder="https://hooks.slack.com/services/..."
          class="w-full rounded-lg border border-slate-800 bg-slate-950/60 p-2.5 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        <p class="text-xs text-slate-500">One URL = one fixed Slack channel. Change it anytime.</p>
      </div>

      <div class="flex items-center justify-between">
        <p class="text-xs text-slate-500">No account needed. We never store your transcript.</p>
        <button id="submit" class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold hover:bg-indigo-400 active:scale-[.98] transition disabled:opacity-50 disabled:cursor-not-allowed">
          Extract & Post to Slack
        </button>
      </div>
    </section>

    <section id="result" class="hidden space-y-3">
      <div class="rounded-xl border border-slate-800 bg-slate-900/60 p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="text-sm font-semibold text-slate-200">Extracted decisions</h2>
          <span id="status" class="text-xs text-slate-500"></span>
        </div>
        <div id="output" class="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap"></div>
      </div>
    </section>

    <footer class="text-xs text-slate-600">
      Built for vibe coding. MIT licensed.
    </footer>
  </main>

  <script>
    const transcriptEl = document.getElementById('transcript');
    const webhookEl = document.getElementById('webhook');
    const submitBtn = document.getElementById('submit');
    const resultEl = document.getElementById('result');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');

    submitBtn.addEventListener('click', async () => {
      const text = transcriptEl.value.trim();
      const webhook = webhookEl.value.trim();
      if (!text) return alert('Paste a transcript first.');
      if (!webhook) return alert('Paste a Slack webhook URL.');

      statusEl.textContent = 'Working...';
      resultEl.classList.remove('hidden');
      outputEl.textContent = '';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript: text, webhookUrl: webhook })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');

        outputEl.textContent = data.formatted || JSON.stringify(data, null, 2);
        statusEl.textContent = 'Posted to Slack ✓';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        outputEl.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
