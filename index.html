<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting-to-Decision Extractor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>.hidden{display:none}</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-semibold mb-6">Meeting-to-Decision Extractor</h1>
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-4">
      <label for="transcript" class="block text-sm font-medium mb-2">Transcript</label>
      <textarea id="transcript" rows="12" class="w-full rounded-lg bg-gray-900 border border-gray-700 p-3 text-sm focus:outline-none focus:border-gray-500" placeholder="Paste raw transcript, .vtt, or .txt here"></textarea>
      <button id="submit" class="mt-3 w-full py-2 rounded-lg bg-white text-black font-medium">Extract & Send to Slack</button>
      <pre id="error" class="mt-3 text-sm text-red-400 hidden"></pre>
      <pre id="result" class="mt-3 text-sm text-green-400 hidden whitespace-pre-wrap"></pre>
    </div>
    <div class="mt-6 text-xs text-gray-500">MVP · No auth · No storage</div>
  </div>

  <script>
    const transcript = document.getElementById('transcript');
    const submit = document.getElementById('submit');
    const error = document.getElementById('error');
    const result = document.getElementById('result');

    function showError(msg) {
      error.textContent = String(msg || '');
      error.classList.remove('hidden');
      result.classList.add('hidden');
    }
    function showResult(msg) {
      result.textContent = String(msg || '');
      result.classList.remove('hidden');
      error.classList.add('hidden');
    }

    submit.addEventListener('click', async () => {
      error.classList.add('hidden');
      result.classList.add('hidden');
      const raw = transcript.value;
      if (!raw.trim()) return showError('Paste a transcript first.');

      submit.disabled = true;
      try {
        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ transcript: raw })
        });
        const data = await res.json();
        if (!res.ok) return showError(data.error || 'Request failed');

        submit.classList.add('hidden');
        showResult(JSON.stringify(data, null, 2));
      } catch (e) {
        showError(e.message);
      } finally {
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
